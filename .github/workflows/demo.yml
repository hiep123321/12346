name: .NET Test

on:
 push:
  branches: [ main ]

jobs:
 build:

  runs-on: windows-latest

  steps:
  - uses: actions/checkout@v3

  - name: Setup .NET
    uses: actions/setup-dotnet@v3
    with:
      dotnet-version: 9.0.x

  - name: Restore
    run: dotnet restore

  - name: Build
    run: dotnet build

  - name: Test
    run: dotnet test
